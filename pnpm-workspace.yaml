# pnpm blocks dependency build/install scripts by default; these are the ones we
# approve. The pinned pnpm@11.4.0 reads the `allowBuilds` map (this is exactly
# what `pnpm approve-builds` writes) — it does NOT honor `onlyBuiltDependencies`,
# so using that key silently skips these builds and breaks `pnpm install
# --frozen-lockfile` on CI/Cloud with ERR_PNPM_IGNORED_BUILDS.
#   - esbuild: Vite's native bundler; the asset build fails without it.
#   - puppeteer: postinstall downloads Chromium (~150MB) for OG/social image
#     generation (Spatie Browsershot). Set PUPPETEER_SKIP_DOWNLOAD=1 to skip locally.
allowBuilds:
  esbuild: true
  puppeteer: true

# Force patched versions of transitive dev deps flagged by Dependabot
# (all dev-chain, not shipped in the production PHP artifact):
#   - shell-quote (via concurrently): newline-escape bug, GHSA
#   - form-data   (via axios): CRLF injection
#   - js-yaml     (via cosmiconfig←puppeteer): quadratic-complexity DoS
overrides:
  shell-quote: '>=1.8.4'
  form-data: '>=4.0.6'
  js-yaml: '^4.1.2'
  esbuild: '>=0.28.1'
